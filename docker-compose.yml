services:
  chart-mcp:
    build: .
    image: chart-mcp:latest
    container_name: chart-mcp
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Streamable HTTP endpoint is served at http://localhost:8000/mcp
    command: ["--transport", "http", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      # How the chart UI loads ECharts/SheetJS INSIDE THE BROWSER's iframe.
      #   inline       -> libs embedded in the page. No network at all. Most
      #                   robust when the host sandbox blocks egress. (recommended)
      #   cdn          -> jsDelivr (needs internet egress from the browser).
      #   <public-url> -> e.g. http://applflwlrec001.chronodrive.local:8013/assets
      #                   The server hosts the JS on its own /assets route. NOTE:
      #                   it must be the URL the *browser* can reach, NOT the
      #                   docker service name (http://chart-mcp:8000 won't resolve
      #                   in the browser).
      - CHART_MCP_ASSETS=inline
      # DNS-rebinding protection: the streamable-HTTP transport returns 421
      # "Invalid Host header" unless the public Host is allow-listed. Set the
      # hostname(s) clients use (":*" matches any port); "*" disables the check.
      - CHART_MCP_ALLOWED_HOSTS=applflwlrec001.chronodrive.local:*
      # Override the MCP endpoint path if your client expects something other
      # than the default "/mcp":
      # - CHART_MCP_HTTP_PATH=/mcp-builder
